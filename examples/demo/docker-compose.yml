# Cirdan demo stack: a small "real" system with healthy services, a flaky
# worker that crash-loops, and one declared-but-never-started service — so
# map/query/incidents/drift all have something to show. See README.md.
services:
  web:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  api:
    image: python:3.12-alpine
    command: >
      python -c "
      import http.server, json, os;
      class H(http.server.BaseHTTPRequestHandler):
          def do_GET(self):
              body = json.dumps({'service': 'demo-api', 'db': os.environ.get('DATABASE_URL', '')[:20], 'ok': True}).encode();
              self.send_response(200); self.send_header('Content-Type', 'application/json');
              self.send_header('Content-Length', str(len(body))); self.end_headers(); self.wfile.write(body);
          def log_message(self, fmt, *args): print('INFO', fmt % args);
      http.server.HTTPServer(('0.0.0.0', 8000), H).serve_forever()"
    environment:
      DATABASE_URL: postgres://demo:demo@postgres:5432/demo
      REDIS_HOST: redis
      PAYMENTS_URL: https://payments.example.com/v1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo

  redis:
    image: redis:7-alpine

  # Crash-loops on purpose: logs error lines then dies; Docker restarts it.
  # Cirdan sees the restart loop + clusters the errors → opens an incident.
  flaky-worker:
    image: busybox
    command: >
      sh -c "echo 'INFO worker starting';
             sleep 5;
             echo 'ERROR database connection refused (postgres:5432)';
             echo 'ERROR database connection refused (postgres:5432)';
             echo 'ERROR job batch-42 failed: connection reset';
             sleep 2;
             exit 1"
    restart: on-failure

  # Declared here but never started (profile gate) → Cirdan reports
  # "declared but nothing matching is running" drift.
  cron-reporter:
    image: busybox
    command: sh -c "echo reporting && sleep 3600"
    profiles: ["extra"]
