name: release-npm

# Builds the zero-Python standalone `cirdan` binary per platform with
# PyInstaller, packs each into its @cirdanops/cli-<platform> npm package, and
# publishes them plus the @cirdanops/cli meta package on release. Independent of
# the PyPI/Docker jobs in release.yml; reuses the same trigger.

on:
  release:
    types: [published]
  workflow_dispatch: {} # manual re-run for the current pyproject version (no new release/tag needed)

jobs:
  version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert pyproject == __init__ (and == tag on release)
        run: |
          PYPROJECT=$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT=$(python3 -c "import re;print(re.search(r'__version__ = \"([^\"]+)\"', open('cirdan/__init__.py').read()).group(1))")
          echo "pyproject=$PYPROJECT  __init__=$INIT  event=$GITHUB_EVENT_NAME  ref=$GITHUB_REF_NAME"
          if [ "$PYPROJECT" != "$INIT" ]; then
            echo "::error::pyproject ($PYPROJECT) != __init__ ($INIT)"
            exit 1
          fi
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            if [ "$INIT" != "$TAG" ]; then
              echo "::error::release tag $GITHUB_REF_NAME does not match version $INIT"
              exit 1
            fi
          fi

  build-binaries:
    needs: version-guard
    name: build ${{ matrix.target }}
    permissions:
      contents: write # upload the binary as a release asset (for Homebrew + curl installer)
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: darwin-arm64, runner: macos-14, ext: "" }
          # darwin-x64 (Intel) dropped: GitHub macos-13 runners are scarce and
          # block the matrix. Intel-Mac users fall back to `pip install cirdanops`.
          - { target: linux-x64, runner: ubuntu-22.04, ext: "" }
          - { target: linux-arm64, runner: ubuntu-22.04-arm, ext: "" }
          - { target: win32-x64, runner: windows-2022, ext: ".exe" }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Cirdan + PyInstaller
        run: python -m pip install -e ".[all]" pyinstaller
      - name: Build standalone binary
        run: pyinstaller cirdan.spec
      - name: Stage binary into platform package
        shell: bash
        run: |
          mkdir -p "npm/platforms/${{ matrix.target }}/bin"
          cp "dist/cirdan${{ matrix.ext }}" "npm/platforms/${{ matrix.target }}/bin/cirdan${{ matrix.ext }}"
          chmod +x "npm/platforms/${{ matrix.target }}/bin/cirdan${{ matrix.ext }}" || true
      - name: Smoke test — version (lazy cirdan imports load)
        shell: bash
        run: |
          "dist/cirdan${{ matrix.ext }}" --version
      - name: Smoke test — serve-mcp starts (mcp extra bundled)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="dist/cirdan${{ matrix.ext }}"
          # serve-mcp would crash on startup if the mcp extra weren't bundled.
          # No `timeout` here — macOS runners don't ship it. Hold stdin open with a
          # slow feeder and confirm the server is still alive after a few seconds.
          ( sleep 12 ) | "$BIN" serve-mcp >/tmp/mcp.out 2>/tmp/mcp.err &
          PID=$!
          sleep 8
          if kill -0 "$PID" 2>/dev/null; then
            echo "serve-mcp is up — mcp extra bundled"
            kill "$PID" 2>/dev/null || true
            wait "$PID" 2>/dev/null || true
          else
            echo "::error::serve-mcp exited early"
            echo "--- stdout ---"; cat /tmp/mcp.out || true
            echo "--- stderr ---"; cat /tmp/mcp.err || true
            exit 1
          fi
      - name: Upload binary as a release asset (Homebrew + curl installer source)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          ASSET="cirdan-${{ matrix.target }}${{ matrix.ext }}"
          cp "dist/cirdan${{ matrix.ext }}" "$ASSET"
          gh release upload "v$VERSION" "$ASSET" --clobber
      - uses: actions/upload-artifact@v4
        with:
          name: npmpkg-${{ matrix.target }}
          path: npm/platforms/${{ matrix.target }}/

  publish-npm:
    needs: build-binaries
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # npm provenance / OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          pattern: npmpkg-*
          path: npm/_built
      - name: Re-stage built binaries
        run: |
          for d in npm/_built/npmpkg-*/; do
            t="$(basename "$d" | sed 's/^npmpkg-//')"
            mkdir -p "npm/platforms/$t"
            cp -r "$d"/. "npm/platforms/$t/"
          done
      - name: Sync versions from pyproject
        run: |
          VERSION=$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "publishing npm version $VERSION"
          npm --prefix npm/cli version "$VERSION" --no-git-tag-version --allow-same-version
          for d in npm/platforms/*/; do
            [ -f "$d/package.json" ] && npm --prefix "$d" version "$VERSION" --no-git-tag-version --allow-same-version
          done
          VERSION="$VERSION" node -e "const fs=require('fs');const p='npm/cli/package.json';const j=JSON.parse(fs.readFileSync(p));for(const k of Object.keys(j.optionalDependencies)){j.optionalDependencies[k]=process.env.VERSION;}fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"
      - name: Publish platform packages first
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for d in npm/platforms/*/; do
            [ -f "$d/package.json" ] && [ -d "$d/bin" ] || continue
            name=$(node -p "require('./$d/package.json').name")
            ver=$(node -p "require('./$d/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "$name@$ver already published — skipping"
            else
              npm publish "$d" --access public --provenance
            fi
          done
      - name: Publish meta package last
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          name=$(node -p "require('./npm/cli/package.json').name")
          ver=$(node -p "require('./npm/cli/package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "$name@$ver already published — skipping"
          else
            npm publish npm/cli --access public --provenance
          fi
